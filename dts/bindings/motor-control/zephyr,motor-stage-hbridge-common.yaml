# Shared power-stage semantics (fault GPIOs, PWM timing, optional monitoring).
# Leaf bindings add Zephyr PWM specifiers or SoC HAL nodes (STM32 LL, ESP MCPWM).

include: base.yaml

properties:
  nfault-gpios:
    type: phandle-array
    description: |
      Gate driver nFAULT input GPIO (active-low, interrupt-capable).
      When asserted, the hardware has already disabled outputs.
      The backend fires motor_fault_cb_t with MOTOR_FAULT_GATE_DRIVER.

  nsleep-gpios:
    type: phandle-array
    description: |
      Gate driver nSLEEP / shutdown GPIO (active-high or active-low
      depending on driver). Used to place the driver in low-power mode
      when the motor is idle.

  sto-gpios:
    type: phandle-array
    description: |
      Dual-channel Safe Torque Off input GPIOs [STO_CH1, STO_CH2].
      Both channels must be GPIO_ACTIVE_HIGH and interrupt-capable.
      When both assert, PWM outputs are inhibited in hardware.
      Required for ASIL-B and above. If absent, motor_sto_arm()
      returns -ENOTSUP.
      Example:
        sto-gpios = <&gpiob 10 GPIO_ACTIVE_HIGH>,
                    <&gpiob 11 GPIO_ACTIVE_HIGH>;

  pwm-frequency:
    type: int
    required: true
    description: PWM switching frequency in Hz.

  deadtime-ns:
    type: int
    default: 0
    description: |
      Dead-time between complementary half-bridge transitions
      (nanoseconds). Set to 0 if the gate driver IC handles
      dead-time internally (e.g. DRV8833) or the SoC binding documents
      where dead-time is applied.

  vbus-fault-threshold-mv:
    type: int
    description: |
      Bus voltage fault threshold in millivolts used during the
      self_test() transistor check sequence. If the bus voltage
      collapses below this level while both low-side transistors
      are off, a multiple-short condition is flagged.

  io-channels:
    type: phandle-array
    description: |
      Optional ADC channels for bus voltage and board temperature.
      Channel names: "v_bus", "temp_board".

  io-channel-names:
    type: string-array
    description: |
      Names for optional io-channels entries.
      Valid names: "v_bus", "temp_board".
