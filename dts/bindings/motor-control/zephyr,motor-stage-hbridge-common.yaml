# Base binding: N half-bridges, one HS + one LS transistor per leg, shared
# timebase. Leaf bindings (STM32 LL, ESP32 MCPWM) map legs to SoC hardware.

include: base.yaml

description: |
  Power stage as an ordered set of N half-bridges: each leg is a totem of one
  high-side (HS) and one low-side (LS) transistor. All legs share one counter /
  period so switching stays phase-aligned. Optional nFAULT, nSLEEP, dual-channel
  STO, and monitoring ADCs apply to the stage as a whole.

  One model supports DC brushed, BLDC/PMSM (inverter), and generic converters
  by varying N and how the driver maps duty to FETs:

  • N = 1  — one half-bridge, unidirectional (magnitude on one leg)
  • N = 2  — full-bridge DC: two half-bridges, bidirectional (sign / magnitude)
  • N = 3  — three half-bridges (future BLDC/PMSM, SVPWM, same binding family)
  • N ≥ 1  — interleaved or multi-cell converters (same per-leg model)

  Example: STM32 LL, TIM3, two legs for full-bridge DC
  (DT node properties — see zephyr,motor-stage-hbridge-stm32):

    motor_brushed: motor-brushed {
        compatible = "zephyr,motor-stage-hbridge-stm32";
        st,pwm-timer  = <&timers3>;
        pwm-channels  = <1 2>;
        pwm-frequency = <20000>;
        trgo-source   = "update";
    };

  Example: future 3‑phase, TIM1 complementary (HS+LS+deadtime per leg):

    motor_3ph: motor-3ph {
        compatible = "zephyr,motor-stage-hbridge-stm32";
        st,pwm-timer = <&timers1>;
        pwm-channels = <1 2 3>;
        pwm-frequency = <20000>;
        deadtime-ns   = <400>;
        stm32,complementary-pwm;
        trgo-source  = "update";
    };

properties:
  nfault-gpios:
    type: phandle-array
    description: |
      Gate driver nFAULT (active-low, interrupt-capable). When asserted, outputs
      are already disabled. Backend may report MOTOR_FAULT_GATE_DRIVER.

  nsleep-gpios:
    type: phandle-array
    description: nSLEEP / shutdown; low-power when motor is idle.

  sto-gpios:
    type: phandle-array
    description: |
      Dual-channel STO inputs [STO_CH1, STO_CH2], GPIO_ACTIVE_HIGH, IRQ-capable.
      Example:
        sto-gpios = <&gpiob 10 GPIO_ACTIVE_HIGH>, <&gpiob 11 GPIO_ACTIVE_HIGH>;

  pwm-frequency:
    type: int
    required: true
    description: PWM switching frequency in Hz.

  deadtime-ns:
    type: int
    default: 0
    description: |
      Dead-time between HS/LS in a complementary pair (ns). 0 if the gate
      driver or binding applies dead-time elsewhere.

  vbus-fault-threshold-mv:
    type: int
    description: |
      For self_test(): if bus sags below this mV with both LS off, report short.

  io-channels:
    type: phandle-array
    description: 'Optional Vbus / board temp. Names: "v_bus", "temp_board".'

  io-channel-names:
    type: string-array
    description: |
      Valid names: "v_bus", "temp_board".
