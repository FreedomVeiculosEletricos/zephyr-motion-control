description: |
  Top-level motor controller node. References one sensor backend and
  one power stage backend and ties them into a complete controller
  instance that the motor subsystem manages.

  This node is the composition point for the three-layer API:
    - sensor   phandle → sensor/feedback layer (interface B)
    - actuator phandle → power stage layer     (interface C)
    - algorithm        → controller algorithm  (interface A dispatch)

  The motor subsystem's MOTOR_SUBSYS_DEFINE_DT() macro resolves the
  sensor and actuator device handles from these phandles at compile
  time, so no manual device lookup is needed in application code.

  Motor physical constants (Rs, Ld, Lq, flux-linkage, pole-pairs) are
  stored here and passed to the algorithm backend at init. Control
  gains (Kp, Ki) are runtime parameters in motor_ctrl_params and are
  not stored in the DT.

compatible: "zephyr,motor-controller"

include: base.yaml

properties:
  sensor:
    type: phandle
    required: true
    description: |
      Sensor backend device node. Must be compatible with one of:
        zephyr,motor-sensor-encoder
        zephyr,motor-sensor-hall
        zephyr,motor-sensor-resolver
        zephyr,motor-sensor-sensorless

  actuator:
    type: phandle
    required: true
    description: |
      Power stage backend device node. Must be compatible with one of:
        zephyr,motor-stage-hbridge
        zephyr,motor-stage-3ph-inverter

  algorithm:
    type: string
    required: true
    enum:
      - "foc"        # Field-Oriented Control (PMSM / BLDC sinusoidal)
      - "6step"      # Trapezoidal 6-step commutation (BLDC)
      - "openloop"   # Open-loop voltage/duty (commissioning, brushed)
      - "vf-scalar"  # V/f scalar control (AC induction)
      - "stepdir"    # Step/direction (stepper open or closed loop)
    description: |
      Controller algorithm vtable to instantiate at init.
      Kconfig options gate which algorithms are compiled into the
      firmware image (CONFIG_MOTOR_ALGO_FOC, CONFIG_MOTOR_ALGO_6STEP,
      etc.). Selecting an algorithm not compiled in causes a build
      error.

  pole-pairs:
    type: int
    required: true
    description: |
      Motor pole pairs. Used by the controller for:
        - Electrical ↔ mechanical angle conversion
        - Rated speed validation (speed-max-rpm × pole-pairs → max ω_elec)
        - BEMF observer scaling

  current-loop-rate-hz:
    type: int
    default: 20000
    description: |
      Current loop execution rate in Hz. Must be ≤ the PWM switching
      frequency defined in the actuator node. The power stage backend
      fires the control loop callback at this rate via the PWM period
      ISR.

  speed-loop-rate-hz:
    type: int
    default: 1000
    description: Speed loop (Rate 1) execution rate in Hz.

  position-loop-rate-hz:
    type: int
    default: 200
    description: |
      Position loop (Rate 2) execution rate in Hz.
      Set to 0 to disable the position loop (speed mode only).

  supervision-rate-hz:
    type: int
    default: 50
    description: |
      Supervision loop (Rate 3) rate in Hz. Handles fault policy,
      thermal derating, state machine transitions, and watchdog.

  i-max-ma:
    type: int
    required: true
    description: |
      Software peak current limit in milliamperes. Applied by the
      current loop before the hardware comparator limit defined in
      the actuator node (i-peak-limit-ma).

  speed-max-rpm:
    type: int
    required: true
    description: Maximum mechanical speed in RPM.

  temp-derating-start-dc:
    type: int
    default: 8000
    description: |
      Temperature above which torque derating begins, in deci-Celsius.
      Example: 8000 = 80.0 °C. The torque limit is linearly reduced
      between this threshold and temp-fault-dc.

  temp-fault-dc:
    type: int
    default: 10000
    description: |
      Overtemperature fault threshold in deci-Celsius.
      Example: 10000 = 100.0 °C. MOTOR_FAULT_OVERTEMP_MOTOR or
      MOTOR_FAULT_OVERTEMP_BOARD is raised and the motor is disabled.

  # ── Motor physical constants (static, used by algorithm backend) ──

  rs-mohm:
    type: int
    description: |
      Stator resistance in milliohms (mΩ). Required for FOC, BEMF
      observer, and flux observer algorithms.

  ld-uh:
    type: int
    description: D-axis inductance in microhenries (µH).

  lq-uh:
    type: int
    description: |
      Q-axis inductance in microhenries (µH).
      For SPM (surface magnet): lq-uh = ld-uh.
      For IPM (interior magnet): lq-uh > ld-uh.

  flux-linkage-uwb:
    type: int
    description: |
      Permanent magnet flux linkage in micro-Weber (µWb).
      Used by FOC for MTPA optimisation and back-EMF compensation.
      Not applicable to AC induction motors.

  rotor-inertia-gcm2:
    type: int
    description: |
      Rotor moment of inertia in g·cm². Used by the speed loop for
      feed-forward inertia compensation and autotuning. Optional.

  # ── Settings subsystem key ─────────────────────────────────────────

  settings-key:
    type: string
    description: |
      Base key under which motor_ctrl_params are persisted via the
      Zephyr settings subsystem. Defaults to the DT node label string
      if not specified (e.g. "motor0").
      Example: settings-key = "drive/axis0";
      Gain entries are written as "<settings-key>/kp_iq", etc.
