description: |
  Motor controller: composes one sensor, one actuator, and one algorithm instance
  (phandle). The user wires concrete devices and an algorithm node in Devicetree;
  the subsystem exposes a @c motor_t handle to the application API.

  The motor application API sets a **current reference** (A); the algorithm
  block maps measurements and setpoint to actuator commands.  Different algorithm
  compatibles (e.g. FOC) will be separate child bindings referenced the same way.

  Extending for FOC/BLDC (future) typically adds a new algorithm compatible and
  keeps the same @c sensor / @c actuator / @c algorithm phandle pattern on this
  node (or a specialized controller compatible that includes the same phandles).

compatible: "zephyr,motor-controller"

include: base.yaml

properties:
  sensor:
    type: phandle
    required: true
    description: |
      Sensor backend (e.g. zephyr,motor-sensor-encoder-stm32). See
      per-sensor bindings (e.g. pole-pairs on position sensors).

  actuator:
    type: phandle
    required: true
    description: |
      Power stage (e.g. zephyr,motor-stage-hbridge-stm32): N half-bridges, see
      zephyr,motor-stage-hbridge-common.yaml.

  algorithm:
    type: phandle
    required: true
    description: |
      Algorithm instance (e.g. a node with compatible
      "zephyr,motor-algorithm-dc-current" and tuning properties).
