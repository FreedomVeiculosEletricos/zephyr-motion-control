description: |
  3-phase 6-switch inverter power stage for BLDC, PMSM, and AC
  induction motor control.

  The backend implements:
    - Atomic PWM shadow register update (all three phases committed
      simultaneously at the next PWM reload event)
    - Hardware dead-time insertion (no software dead-time required)
    - Center-aligned (up-down) PWM for noise-free ADC sampling at
      the underflow event
    - Hardware fault path: nFAULT GPIO assertion immediately inhibits
      all PWM outputs without CPU involvement
    - Optional STO dual-channel hardware PWM inhibit (ASIL-B)

  set_vector(Vα, Vβ) maps to SVPWM internally.
  set_duty([d0, d1, d2]) is available for 6-step and V/f control.

  This node is also compatible with RFC #102158 Solution 2 (Unified
  Inverter Driver) semantics when adc-trigger-event and sto-gpios
  are defined.

compatible: "zephyr,motor-stage-3ph-inverter"

include: base.yaml

properties:
  pwm-u:
    type: phandle
    required: true
    description: |
      Timer instance for phase U complementary PWM output.
      The timer must be configured for center-aligned (up-down) mode
      with complementary outputs (CHx + CHxN) and hardware dead-time.

  pwm-v:
    type: phandle
    required: true
    description: Timer instance for phase V complementary PWM output.

  pwm-w:
    type: phandle
    required: true
    description: Timer instance for phase W complementary PWM output.

  pwm-frequency:
    type: int
    required: true
    description: |
      PWM switching frequency in Hz. Center-aligned mode is strongly
      recommended (and assumed by default). The actual timer period
      is computed as: ARR = (timer_clock / pwm-frequency) / 2.

  deadtime-rising-ns:
    type: int
    required: true
    description: |
      Rising edge dead-time in nanoseconds. Inserted between the
      turn-off of the low-side transistor and the turn-on of the
      high-side transistor. The backend converts to timer DTG register
      ticks at init time.

  deadtime-falling-ns:
    type: int
    required: true
    description: |
      Falling edge dead-time in nanoseconds. Inserted between the
      turn-off of the high-side transistor and the turn-on of the
      low-side transistor.

  nfault-gpios:
    type: phandle-array
    description: |
      Gate driver nFAULT GPIO (active-low, interrupt-capable).
      The hardware has already disabled outputs when this asserts.
      The backend fires motor_fault_cb_t with MOTOR_FAULT_GATE_DRIVER.

  en-gpios:
    type: phandle-array
    description: Gate driver enable GPIO (active-high or active-low).

  sto-gpios:
    type: phandle-array
    description: |
      Dual-channel Safe Torque Off input GPIOs [STO_CH1, STO_CH2].
      Both channels must be GPIO_ACTIVE_HIGH and interrupt-capable.
      When both assert, the power stage immediately inhibits all PWM
      outputs in hardware. The controller transitions to
      MOTOR_STATE_STO and motor_fault_cb_t fires.
      Required for ASIL-B and above. Absence causes motor_sto_arm()
      to return -ENOTSUP.
      Example:
        sto-gpios = <&gpioe 10 GPIO_ACTIVE_HIGH>,
                    <&gpioe 11 GPIO_ACTIVE_HIGH>;

  elc:
    type: phandle
    description: |
      Event Link Controller phandle (Renesas platform).
      Links the PWM timer underflow event directly to the ADC trigger
      without CPU intervention. Platform-specific — omit on STM32
      (use adc-trigger-event in the sensor node instead).

  poeg:
    type: phandle
    description: |
      Port Output Enable for GPT phandle (Renesas POEG).
      Hardware PWM shutoff path for the Renesas platform.
      Platform-specific.

  io-channels:
    type: phandle-array
    description: |
      ADC channels for bus voltage and board temperature monitoring.
      These are read by the supervision thread (cold region), not the
      current-loop ISR. Channel names: "v_bus", "temp_board".

  io-channel-names:
    type: string-array
    description: |
      Names for io-channels entries.
      Valid names: "v_bus", "temp_board".

  vbus-nominal-mv:
    type: int
    required: true
    description: Nominal DC-link voltage in millivolts.

  vbus-ov-thresh-mv:
    type: int
    required: true
    description: |
      Overvoltage fault threshold in millivolts.
      Supervision thread triggers MOTOR_FAULT_OVERVOLTAGE when Vbus
      exceeds this level.

  vbus-uv-thresh-mv:
    type: int
    required: true
    description: |
      Undervoltage fault threshold in millivolts.
      Supervision thread triggers MOTOR_FAULT_UNDERVOLTAGE when Vbus
      falls below this level.

  i-peak-limit-ma:
    type: int
    required: true
    description: |
      Peak phase current hardware limit in milliamperes.
      The comparator-based hardware overcurrent protection is
      configured to this threshold at init. Below this level the
      current loop software limit (i-max-ma in the controller node)
      applies first.
