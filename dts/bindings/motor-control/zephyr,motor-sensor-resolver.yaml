description: |
  Resolver position backend using SIN and COS ADC channels.
  Electrical angle is computed via atan2(SIN, COS) with a
  software or hardware tracking observer.

  Resolvers are robust to temperature and vibration, making them
  common in automotive and industrial servo applications.
  No alignment sequence is required.

compatible: "zephyr,motor-sensor-resolver"

include: base.yaml

properties:
  io-channels:
    type: phandle-array
    required: true
    description: |
      ADC channels in order:
        [resolver_sin, resolver_cos, i_phase_a, i_phase_b, i_phase_c]
      The current-sense channels follow the same conventions as
      zephyr,motor-sensor-encoder-stm32. The resolver SIN/COS channels must
      be sampled synchronously with the current channels.

  io-channel-names:
    type: string-array
    description: |
      Names for io-channels entries.
      Valid names: "resolver_sin", "resolver_cos",
                   "i_phase_a", "i_phase_b", "i_phase_c", "v_bus".

  pole-pairs:
    type: int
    required: true
    description: Motor pole pairs.

  excitation-frequency-hz:
    type: int
    description: |
      Resolver excitation signal frequency (Hz).
      Default: 10000 (10 kHz).
    default: 10000

  resolver-offset-mrad:
    type: int
    description: |
      Electrical angle offset from mechanical zero (milliradians).
      Applied after atan2 to align the resolver zero with the motor
      d-axis. Determined during commutation alignment at installation.
    default: 0

  adc-trigger-event:
    type: int
    description: Hardware ADC trigger event ID. Platform-specific.
