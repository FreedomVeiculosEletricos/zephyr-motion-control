#
# Interactive shell for bench tuning. Build (NUCLEO-G474RE + STM32 LL path):
#   west build -b nucleo_g474re samples/motor_shell -- \
#     -DZEPHYR_EXTRA_MODULES=path/to/zephyr-motion-control
#
# boards/nucleo_g474re.overlay is auto-applied for that board.

CONFIG_PRINTK=y
CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y

CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=4096

CONFIG_MOTOR_STAGE_HBRIDGE_STM32=y
CONFIG_MOTOR_SENSOR_ENCODER_STM32=y

CONFIG_MOTOR_CONTROL_LIB=y
CONFIG_MOTOR_SUBSYS=y
CONFIG_MOTOR_CONTROL_SHELL=y
