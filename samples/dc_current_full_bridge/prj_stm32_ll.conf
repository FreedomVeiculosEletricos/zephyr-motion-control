#
# STM32 LL synchronous chain: TIM3 TRGO -> ADC1 injected -> ADC ISR -> control callback.
# Build with (use CONF_FILE so no default prj.conf is merged):
#   west build -b nucleo_g474re samples/dc_current_full_bridge -- \
#     -DZEPHYR_EXTRA_MODULES=path/to/zephyr-motion-control \
#     -DCONF_FILE=prj_stm32_ll.conf \
#     -DDTC_OVERLAY_FILE=boards/nucleo_g474re_stm32_ll.overlay

CONFIG_PRINTK=y
CONFIG_GPIO=y
CONFIG_PINCTRL=y

# CONFIG_PWM is not set
# CONFIG_ADC is not set
# CONFIG_COUNTER is not set

CONFIG_MOTOR_STAGE_HBRIDGE_STM32=y
CONFIG_MOTOR_SENSOR_ENCODER_STM32=y

CONFIG_MOTOR_CONTROL_LIB=y
CONFIG_MOTOR_CTRL_OUTER_LOOPS=y
